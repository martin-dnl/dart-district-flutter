name: dartdistrict-backend-nest

services:
  backend:
    container_name: dartdistrict-backend-nest-prod
    build:
      context: .
      dockerfile: Dockerfile
    image: dart-district-nest-backend:latest
    env_file:
      - .env.prod
    restart: unless-stopped
    networks:
      - default

    # Keep port closed publicly when using reverse proxy.
    # Uncomment only for local VPS debug:
    # ports:
    #   - "127.0.0.1:8081:8081"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8081/api/docs', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  default:
    external: true
    name: ${DOCKER_NETWORK_NAME}
